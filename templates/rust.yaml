schema: dxon/v1
name: rust
description: Rust development environment

packages:
  arch:   [curl, git]
  debian: [curl, git, ca-certificates]
  alpine: [curl, git, ca-certificates]

env:
  CARGO_HOME: /root/.cargo
  RUSTUP_HOME: /root/.rustup

run:
  - . /root/.cargo/env && rustup component add clippy rustfmt

options:
  - id: docker
    prompt: "Install Docker CLI tooling inside the container?"
    choices: ["no", "yes"]
    default: "no"

steps:
  - name: Install Rust toolchain
    distro: arch
    run:
      - pacman -Sy --noconfirm rustup
      - rustup default stable

  - name: Install Rust toolchain
    distro: debian
    tools: [build-tools]
    run:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
      - . /root/.cargo/env && rustup default stable

  - name: Install Rust toolchain
    distro: alpine
    tools: [build-tools]
    run:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
      - . /root/.cargo/env && rustup default stable

  - name: Install Docker
    tools: [docker, docker-compose]
    when:
      docker: "yes"
